<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Select Target | Circuit Analytics</title>

<link rel="stylesheet"
      href="{{ url_for('static',
      filename='style.css') }}">

</head>

<body>

<div class="app-page auth-page">

    <main class="panel narrow-panel">

        <div class="eyebrow">Model Configuration</div>

        <h1>Select Target Column</h1>

        <p>Choose the output column the model should learn to predict.</p>

        {% if has_saved_model %}

        <a class="button-link secondary-link"
           href="/trained-model">

            Use Existing Trained Model
        </a>

        <div class="divider">or train a new model</div>

        {% endif %}

        <form action="/train"
              method="POST">

            <label class="field-label"
                   for="target">Target column</label>

            <select id="target"
                    name="target">

                {% for column in columns %}

                <option value="{{ column }}">

                    {{ column }}

                </option>

                {% endfor %}

            </select>

            <button type="submit">

                Train New Model

            </button>

        </form>

    </main>

</div>

</body>

</html>
