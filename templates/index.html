<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title> Circuit Analytics</title>

<link rel="stylesheet"
      href="{{ url_for('static',
      filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet">

</head>

<body>

<div class="app-page auth-page">

    <main class="panel narrow-panel">

        <div class="eyebrow">Dataset Setup</div>

        <h1> Circuit Analytics</h1>

        <p>

            Upload an analog circuit dataset to train a regression model and review performance insights.

        </p>

        <form action="/upload"
              method="POST"
              enctype="multipart/form-data">

            <label class="upload-box">

                <span>CSV dataset</span>

                <input type="file"
                       name="dataset"
                       accept=".csv"
                       required>

            </label>

            <button type="submit">

                Upload Dataset

            </button>

        </form>

        {% if has_saved_model %}

        <a class="button-link secondary-link"
           href="/trained-model">

            Use Trained Model
        </a>

        {% endif %}

    </main>

</div>

</body>

</html>
